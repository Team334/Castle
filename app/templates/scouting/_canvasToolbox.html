          <!-- Controls -->
          <div
            class="controls space-y-4 flex flex-col items-center text-center p-4"
          >
            <!-- Color and Thickness Controls -->
            <div
              class="flex flex-col sm:flex-row items-center gap-4 w-full sm:justify-center"
            >
              <div class="color-picker-container w-full sm:w-auto">
                <input
                  type="text"
                  id="pathColorPicker"
                  class="w-full sm:w-36 dark:bg-gray-800 dark:border-gray-600 dark:text-white dark:placeholder-gray-400"
                  value="#2563eb"
                  data-coloris
                />
              </div>
              <div class="flex items-center gap-2 w-full sm:w-auto">
                <label
                  for="pathThickness"
                  class="text-gray-700 dark:text-gray-300 whitespace-nowrap"
                  >Thickness:</label
                >
                <input
                  type="range"
                  id="pathThickness"
                  min="1"
                  max="20"
                  value="3"
                  class="w-full sm:w-48 h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer"
                />
                <span
                  id="pathThicknessValue"
                  class="text-gray-700 dark:text-gray-300 w-8 text-center"
                  >3</span
                >
              </div>
              <div class="w-full sm:w-auto">
                <button
                  id="fillToggle"
                  type="button"
                  class="w-full sm:w-auto px-4 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded hover:bg-blue-700 dark:hover:bg-blue-600 transition-colors"
                  title="Fill: Off"
                >
                  Fill: Off
                </button>
              </div>
            </div>

            <!-- Tool Buttons -->
            <div
              class="flex flex-col lg:flex-row gap-4 w-full items-center justify-center"
            >

                  id="selectTool"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Select (Ctrl+A)"

                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"

                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15.042 21.672L13.684 16.6m0 0l-2.51 2.225.569-9.47 5.227 7.917-3.286-.672zM12 2.25V4.5m5.834.166l-1.591 1.591M20.25 10.5H18M7.757 14.743l-1.59 1.59M6 10.5H3.75m4.007-4.243l-1.59-1.59"
                    />
                  </svg>
                </button>
                <button
                  id="penTool"
                  type="button"
                  class="tool-btn active rounded-xl"
                  title="Pen (Ctrl+P)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125"
                    />
                  </svg>

                  title="Rectangle (Ctrl+R)"

                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"

                      stroke-linecap="round"
                      stroke-linejoin="round"

                    />
                  </svg>
                </button>
                <button
                  id="circleTool"

                  class="tool-btn rounded-xl"
                  title="Circle (Ctrl+C)"

                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"

                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"

                <button
                  id="lineTool"

                  title="Line (Ctrl+L)"

                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3.75 9h16.5m-16.5 6.75h16.5"

                </button>
                <button
                  id="arrowTool"

                  class="tool-btn rounded-xl"
                  title="Arrow (Ctrl+W)"

                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
                    />
                  </svg>
                </button>
                <button
                  id="hexagonTool"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Hexagon (Ctrl+H)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 2l8.66 5v10L12 22l-8.66-5V7L12 2z"
                    />
                  </svg>
                </button>
                <button
                  id="starTool"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Star (Ctrl+S)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"
                    />
                  </svg>
                </button>
                <button
                  id="goHome"
                  type="button"

                  title="Reset View"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"

                    />
                  </svg>
                </button>
                <button
                  id="flipHorizontal"
                  type="button"
                  class="tool-btn bg-purple-50 text-purple-700 hover:bg-purple-100 border-purple-300 rounded-xl"

                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"

                      stroke-linejoin="round"

                    />

                </button>
                <button

                  class="tool-btn bg-purple-50 text-purple-700 hover:bg-purple-100 border-purple-300 rounded-xl"
                  title="Flip Vertically"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"

                </button>
                <button
                  id="rotateCw"
                  type="button"
                  class="tool-btn bg-green-50 text-green-700 hover:bg-green-100 border-green-300 rounded-xl"
                  title="Rotate Clockwise"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"

                    />
                  </svg>
                </button>
                <button
                  id="rotateCcw"
                  type="button"
                  class="tool-btn bg-green-50 text-green-700 hover:bg-green-100 border-green-300 rounded-xl"
                  title="Rotate Counter-Clockwise"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"
                    />
                  </svg>
                </button>
              </div>

              <!-- Action Buttons -->
              <div class="actions-group">
                <button
                  id="undoPath"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Undo (Ctrl+Z)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"

                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"
                    />
                  </svg>
                </button>
                <button
                  id="redoPath"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Redo (Ctrl+Y or Ctrl+Shift+Z)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 15l6-6m0 0l-6-6m6 6H9a6 6 0 000 12h3"
                    />
                  </svg>
                </button>
                <button
                  id="clearPath"
                  type="button"
                  class="tool-btn bg-red-50 text-red-700 hover:bg-red-100 border-red-300 rounded-xl"
                  title="Clear"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
                    />
                  </svg>
                </button>
                <button
                  id="savePath"
                  type="button"
                  class="tool-btn bg-green-50 text-green-700 hover:bg-green-100 border-green-300 rounded-xl"
                  title="Save"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
                    />
                  </svg>
                </button>
                <button
                  id="loadPath"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Load"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
                    />
                  </svg>
                </button>
                <button
                  id="readonlyToggle"
                  type="button"
                  class="tool-btn rounded-xl"
                  title="Toggle Read-only Mode"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                    />
                  </svg>
                </button>
                <input
                  type="file"
                  id="loadFile"
                  class="hidden dark:bg-gray-800 dark:border-gray-600 dark:text-white dark:placeholder-gray-400"
                  accept=".json"
                />
              </div>
            </div>
          </div>
