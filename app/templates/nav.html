<nav class="z-50 box-border max-w-6xl shadow-lg hidden sm:block bg-blue-100 dark:bg-gray-800 rounded-full opacity-85 mt-2 transition-colors duration-200">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center gap-10">
            <div class="flex space-x-4 text-center">
                <a href="{{ url_for('index') }}" class="flex items-center text-center hover:text-blue-500">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="h-12 dark:hidden">
                    <img src="{{ url_for('static', filename='logo-dark.png') }}" alt="Logo" class="h-12 hidden dark:block">
                    <p class="py-4 px-2 text-center -ml-4">Castle</p>
                </a>
                <!-- Offline Status Indicator -->
                <div id="nav-offline-indicator" class="hidden py-1 px-3 bg-amber-100 border border-amber-300 rounded-full flex items-center space-x-2 text-amber-700 font-medium relative group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span>Offline Mode</span>
                    <!-- Tooltip that appears on hover -->
                    <div class="hidden group-hover:block absolute top-full left-1/2 transform -translate-x-1/2 mt-1 px-3 py-2 bg-gray-800 text-white text-xs font-normal rounded-lg shadow-lg whitespace-nowrap z-50">
                        Using Cached Content Only Accessed Before
                        <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 h-2 w-2 rotate-45 bg-gray-800"></div>
                    </div>
                </div>
                {% if current_user.is_authenticated %}
                    {% if current_user.teamNumber %}
                        <a href="{{ url_for('scouting.home') }}" class="py-4 px-2 hover:text-blue-500 text-center">Scout</a>
                        <a href="{{ url_for('scouting.lighthouse') }}" class="py-4 px-2 hover:text-purple-500 text-center">Compare</a>
                        <a href="{{ url_for('team.manage') }}" class="py-4 px-2 hover:text-blue-500 text-center">Team</a>
                    {% else %}
                        <a href="{{ url_for('team.join') }}" class="py-4 px-2 hover:text-green-500 text-center">Join Team</a>
                    {% endif %}
                {% endif %}
            </div>
            <div class="flex space-x-4 items-center">
                <button class="theme-toggle p-2 rounded-full hover:bg-blue-200 dark:hover:bg-gray-700 transition duration-200 focus:outline-none" title="Toggle Dark Mode">
                    <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
                {% if current_user.is_authenticated %}
                    <div class="relative flex items-center space-x-2">
                        <button id="userDropdownButton" class="flex items-center space-x-2 hover:text-blue-500 dark:hover:text-blue-400">
                            <img src="{{ url_for('auth.profile_picture', user_id=current_user.get_id()) }}" 
                                    alt="Profile Picture" 
                                    class="w-10 h-10 rounded-full">
                            <span class="py-4 px-2">{{current_user.username}}</span>
                            <svg class="w-4 h-4 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <!-- Dropdown menu -->
                        <div id="userDropdown" class="hidden absolute right-0 top-full mt-2 w-32 text-center bg-white dark:bg-gray-800 rounded-xl shadow-lg py-2 z-50 border border-transparent dark:border-gray-700">
                            <a href="{{ url_for('auth.profile', username=current_user.username) }}" 
                                class="block px-4 py-2 text-gray-800 dark:text-gray-200 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-500 dark:hover:text-blue-400">
                                Profile
                            </a>
                            <a href="{{ url_for('auth.settings') }}" 
                                class="block px-4 py-2 text-gray-800 dark:text-gray-200 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-500 dark:hover:text-blue-400">
                                Settings
                            </a>
                            <div class="border-t border-gray-100 dark:border-gray-700 my-1"></div>
                            <a href="{{ url_for('auth.logout') }}" 
                                class="block px-4 py-2 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-gray-700">
                                Logout
                            </a>
                        </div>
                    </div>
                {% else %}
                    <a href="{{ url_for('auth.login') }}" class="py-4 px-2 hover:text-blue-500">Login</a>
                    <a href="{{ url_for('auth.register') }}" class="py-4 px-2 hover:text-blue-500">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
